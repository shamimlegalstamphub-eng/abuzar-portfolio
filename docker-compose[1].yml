version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abuzar-portfolio
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    restart: unless-stopped

  # Optional: Add reverse proxy (nginx)
  nginx:
    image: nginx:alpine
    container_name: abuzar-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
